services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-4000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-}
    ports:
      - "4000:4000"
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/healthz').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
